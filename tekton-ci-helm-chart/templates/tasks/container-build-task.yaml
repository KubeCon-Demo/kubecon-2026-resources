apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kaniko
spec:
  description: Builds a Dockerfile with Kaniko and pushes it to a registry.
  workspaces:
    - name: source
      description: The PVC holding the context and Dockerfile.
    - name: dockerconfig
      description: Secret containing a docker config.json for registry authentication.
      # THE FIX: This forces Tekton to mount the secret exactly where Kaniko expects it
      mountPath: /kaniko/.docker 
  params:
    - name: IMAGE
      description: Full name and tag of the image to build (e.g., myregistry.com/my-app:latest).
      type: string
    - name: DOCKERFILE
      description: Path to the Dockerfile relative to the workspace.
      type: string
      default: "./demo/Dockerfile"
    - name: CONTEXT
      description: The build context path.
      type: string
      default: "./demo"
  results:
    - name: IMAGE_DIGEST
      description: Digest of the image just built.
    - name: IMAGE_URL
      description: URL of the image just built.
  steps:
    - name: build-image
      image: gcr.io/kaniko-project/executor:latest
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsUser: 0 # Kaniko requires root to build
      args:
        - --dockerfile=$(params.DOCKERFILE)
        - --context=$(workspaces.source.path)/$(params.CONTEXT)
        - --destination=$(results.step-build-image.path)
        - --digest-file=$(results.IMAGE_DIGEST.path)
        - --no-push
    # kaniko build status check
    - name: check-build-status
      image: busybox 
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -e
        if [ "$?" -eq 0 ]; then
          echo "Build Successful"
          echo -n "0" > $(results.BUILD_STATUS.path)
        else
          echo "Build Failed"
          echo -n "1" > $(results.BUILD_STATUS.path)
        fi
      onError: continue
    # if kaniko build status has error, go to next task
    - name: push-image
      image: gcr.io/kaniko-project/executor:latest
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsUser: 0 # Kaniko requires root to build
      script: |
        #!/bin/sh
        if [ "$(results.BUILD_STATUS.path)" = "0" ]; then
          /kaniko/executor \
            --dockerfile=$(params.DOCKERFILE) \
            --context=$(workspaces.source.path)/$(params.CONTEXT) \
            --destination=$(params.IMAGE)
        else
          echo "Skipping push because build failed"
        fi
    # step for saving image digest for next tasks    
    - name: write-url
      image: bash:latest
      script: |
        #!/usr/bin/env bash
        set -e
        echo -n "$(params.IMAGE)" > "$(results.IMAGE_URL.path)"