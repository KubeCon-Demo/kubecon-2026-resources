apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: github-set-status
spec:
  description: Sets the GitHub commit status using a lightweight curl container.
  params:
    - name: REPO_FULL_NAME
      description: The GitHub repository full name, e.g., KubeCon-Demo/demo-app
      type: string
    - name: SHA
      description: Commit SHA to set the status for.
      type: string
    - name: PIPELINE_STATUS
      description: The aggregate status of the pipeline (Succeeded, Failed, etc.)
      type: string
  steps:
    - name: set-status
      image: curlimages/curl:latest
      env:
        # We pass the token safely as an environment variable from a Secret
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.githubPatSecret }}
              key: token
      script: |
        #!/bin/sh
        set -e
        
        # 1. Map Tekton's internal status to GitHub's expected status
        GH_STATE="failure"
        if [ "$(params.PIPELINE_STATUS)" = "Succeeded" ]; then
          GH_STATE="success"
        fi
        
        # 2. Build the GitHub API payload
        API_URL="https://api.github.com/repos/$(params.REPO_FULL_NAME)/statuses/$(params.SHA)"
        DATA="{\"state\": \"$GH_STATE\", \"description\": \"Tekton CI Pipeline\", \"context\": \"continuous-integration/tekton\"}"
        
        echo "Reporting $GH_STATE to GitHub..."
        
        # 3. Fire the request
        curl -s -L -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -d "$DATA" "$API_URL"