
# ==========================================
# Uses extracted data to dynamically create a PipelineRun
# ==========================================
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: ci-pipeline-template
spec:
  params:
    - name: git-revision
      description: The git revision
    - name: git-url
      description: The git repository url
    - name: commit-sha
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: github-triggered-run-
      spec:
        pipelineRef:
          name: ci-pipeline
        params:
          - name: commit-sha
            value: $(tt.params.commit-sha)
          - name: repo-url
            value: $(tt.params.git-url)
          - name: revision
            value: $(tt.params.git-revision)
          - name: image-destination
            value: "docker.io/barisege/kubecon-demo:latest"
        workspaces:
          - name: shared-data
            persistentVolumeClaim:
              claimName: {{ .Values.sharedWorkspacePVC }}
          - name: ssh-creds
            secret:
              secretName: {{ .Values.sshCredentials }}
          - name: docker-creds
            secret:
              secretName: {{ .Values.dockerCredentials }}
              items:
                - key: .dockerconfigjson
                  path: config.json
