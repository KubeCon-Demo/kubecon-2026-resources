
# ==========================================
# 1. TriggerBinding
# Extracts the branch and repo URL from GitHub
# ==========================================
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-push-binding
spec:
  params:
    - name: git-revision
      value: $(body.ref) # e.g., refs/heads/main
    - name: git-url
      value: $(body.repository.ssh_url) # e.g., git@github.com:org/repo.git
    - name: commit-sha
      value: $(body.after)

---
# ==========================================
# 2. TriggerTemplate
# Uses extracted data to dynamically create a PipelineRun
# ==========================================
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: ci-pipeline-template
spec:
  params:
    - name: git-revision
      description: The git revision
    - name: git-url
      description: The git repository url
    - name: commit-sha
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: github-triggered-run-
      spec:
        pipelineRef:
          name: ci-pipeline
        params:
          - name: commit-sha
            value: $(tt.params.commit-sha)
          - name: repo-url
            value: $(tt.params.git-url)
          - name: revision
            value: $(tt.params.git-revision)
          - name: image-destination
            value: "docker.io/barisege/kubecon-demo:latest"
        workspaces:
          - name: shared-data
            persistentVolumeClaim:
              claimName: pvc-mi3
          - name: ssh-creds
            secret:
              secretName: git-ssh-creds
          - name: docker-creds
            secret:
              secretName: docker-hub-creds
              items:
                - key: .dockerconfigjson
                  path: config.json

---
# ==========================================
# 3. EventListener
# Listens for the webhook, verifies the secret, and runs the template
# ==========================================
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: github-listener
spec:
  # LINKED: Now using the ServiceAccount created at the top of this file
  serviceAccountName: tekton-triggers-sa 
  triggers:
    - name: github-push-trigger
      interceptors:
        - ref:
            name: "github"
          params:
            - name: "secretRef"
              value:
                secretName: github-webhook-secret
                secretKey: secretToken
            - name: "eventTypes"
              value: ["push"]
      bindings:
        - ref: github-push-binding
      template:
        ref: ci-pipeline-template